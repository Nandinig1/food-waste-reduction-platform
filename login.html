<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmartServe AI</title>
  <link rel="stylesheet" href="app.css">
</head>

<body style="display: flex; align-items: center; justify-content: center;">

  <nav>
    <a href="index.html" class="logo">SmartServe AI</a>
  </nav>

  <div class="glass-panel" style="width: 100%; max-width: 450px; padding: 3rem; margin-top: 80px;">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="orgName">Organization Name</label>
        <input type="text" id="orgName" required placeholder="e.g. Hope Foundation">
      </div>

      <div class="form-group" id="ngoYearGroup" style="display: none;">
        <label for="establishedYear">Year Established</label>
        <input type="number" id="establishedYear" placeholder="e.g. 2015" min="1900" max="2026">
      </div>

      <div class="form-group" id="restaurantAddressGroup" style="display: none;">
        <label for="restaurantAddress">Restaurant Main Address</label>
        <input type="text" id="restaurantAddress" placeholder="e.g. 123 Food Street, Downtown">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="name@organization.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <div class="form-group">
        <label for="role">Select Role</label>
        <select id="role" required>
          <option value="restaurant">Restaurant / Donor</option>
          <option value="ngo">NGO / Orphanage</option>
          <option value="delivery">Delivery Personnel / Volunteer</option>
        </select>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
    </form>

    <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
      Don't have an account? <a href="#" style="color: var(--accent-blue);">Register here</a>
    </p>
  </div>

  <script src="app.js"></script>
</body>

</html>
